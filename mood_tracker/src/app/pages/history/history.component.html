<div class="entry-card" [style.--mood-color]="getMoodMeta(entry.mood)?.color">
  <div class="entry-left">
    <span class="entry-emoji">{{ getMoodMeta(entry.mood)?.emoji }}</span>

```
<div class="entry-info">
  <div class="entry-top">
    <div class="entry-mood">{{ getMoodMeta(entry.mood)?.label }}</div>
    <span class="entry-intensity-badge">
      {{ getIntensityLabel(entry.intensity) }}
      @if (entry.intensity) {
        · {{ entry.intensity }}/10
      }
    </span>
  </div>

  @if (entry.note) {
    <div class="entry-note">{{ entry.note }}</div>
  } @else {
    <div class="entry-note empty-note">No note added</div>
  }

  <div class="entry-date">
    {{ entry.createdAt | date:'d MMM yyyy, HH:mm' }}
  </div>
</div>
