<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>To-do List</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="header">
            <h1>ToDo List</h1>
        </header>
        <main class="main">
            <form id="todo">
                <label for="task">ToDo List</label>
                <input type="text" id="task" placeholder="New Task" required>
                <button type="submit">Add</button>
            </form>
            <ul id="task-list">
            </ul>
        </main>
        <script src="script.js"></script>
    </body>
</html>
