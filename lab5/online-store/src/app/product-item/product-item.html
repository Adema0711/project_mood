<div class="card">
    <img [src]="product.image" alt="{{product.name}}" width="150">
    <h3>{{product.name}}</h3>
    <p>{{product.description}}</p>
    <p class="product-price">{{product.price | currency: 'KZT '}}</p>
     <p class="product-rating">⭐ {{product.rating}}</p>
    <p>❤️{{product.likes}}</p>
  <button (click)="onLike()">Like</button>
  <button (click)="onDelete()">Delete</button>
  <a [href]="product.link" target="_blank">Ссылка на Kaspi.kz</a>
    <div class="share-buttons">
    <button (click)="shareWhatsApp(product)">
      Share WhatsApp
    </button>

    <button (click)="shareTelegram(product)">
      Share Telegram
    </button>
  </div>
</div>
